apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: auth-db-secret
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: auth-db-secret
    template:
      data:
        # Tự động ghép nối chuỗi kết nối từ thông tin lấy được
        DATABASE_URL: "postgresql://postgres:{{ .password }}@{{ .endpoint }}:5432/auth_db"
        PASSWORD: "{{ .password }}"
        ENDPOINT: "{{ .endpoint }}"
  data:
  - secretKey: password
    remoteRef:
      key: rds-password
      property: password
  - secretKey: endpoint
    remoteRef:
      key: rds-password
      property: endpoint
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
