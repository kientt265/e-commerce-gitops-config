apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: delivery-db-secret
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-secret-store
    kind: ClusterSecretStore
  target:
    name: delivery-db-secret
    creationPolicy: Owner
  data:
  - secretKey: DATABASE_URL
    remoteRef:
      key: rds-password
