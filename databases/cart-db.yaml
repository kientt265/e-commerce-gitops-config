apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-db
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  serviceName: "cart-db"
  replicas: 1
  selector:
    matchLabels:
      app: cart-db
  template:
    metadata:
      labels:
        app: cart-db
    spec:
      nodeSelector:
        workload_type: stateful
      containers:
      - name: cart-db
        image: postgres:15
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: "postgres"
        - name: POSTGRES_PASSWORD
          value: "password"
        - name: POSTGRES_DB
          value: "cart_db"
        volumeMounts:
        - name: cart-db-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: cart-db-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cart-db
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  selector:
    app: cart-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
  type: ClusterIP
