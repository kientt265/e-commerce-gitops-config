apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-service
  labels:
    app: delivery-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-service
  template:
    metadata:
      labels:
        app: delivery-service
    spec:
      nodeSelector:
        workload_type: stateless
        service_type: event-driven
      containers:
      - name: delivery-service
        image: <your-aws-account-id>.dkr.ecr.us-east-1.amazonaws.com/delivery-service:latest
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: delivery-db-url
        - name: DELIVERY_PORT
          value: "3001"
        - name: KAFKA_BROKER_1
          value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-service
spec:
  selector:
    app: delivery-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
