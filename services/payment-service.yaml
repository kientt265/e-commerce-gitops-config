apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  labels:
    app: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      nodeSelector:
        workload_type: stateless
        service_type: event-driven
      containers:
      - name: payment-service
        image: 582719176716.dkr.ecr.ap-southeast-1.amazonaws.com/payment-service:refresh-code-8
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: payment-db-url
        - name: PAYMENT_PORT
          value: "3001"
        - name: KAFKA_BROKER_1
          value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
