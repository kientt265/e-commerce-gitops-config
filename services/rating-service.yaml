apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-service
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app: rating-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rating-service
  template:
    metadata:
      labels:
        app: rating-service
    spec:
      nodeSelector:
        workload_type: stateless
        service_type: api-based
      containers:
      - name: rating-service
        image: 582719176716.dkr.ecr.ap-southeast-1.amazonaws.com/rating-service:refresh-code-1
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: rating-db-url
        - name: RATING_PORT
          value: "3001"
        - name: KAFKA_BROKER_1
          value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: rating-service
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    app: rating-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001
  type: ClusterIP
